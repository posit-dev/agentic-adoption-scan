name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing

jobs:
  goreleaser:
    name: Build and publish Go binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentic-adoption-scan/go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean --skip=validate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-pypi:
    name: Build and publish Python wheels
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentic-adoption-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentic-adoption-scan/go.mod

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install go-to-wheel
        run: pip install go-to-wheel

      - name: Build Python wheels
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go-to-wheel agentic-adoption-scan \
            --name agentic-adoption-scan \
            --version "$VERSION" \
            --description "Detect agentic coding tool adoption across GitHub organizations" \
            --url "https://github.com/posit-dev/eng-effectiveness-metrics-tools" \
            --author "Elliot Murphy" \
            --author-email "elliot.murphy@posit.co" \
            --readme README.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
