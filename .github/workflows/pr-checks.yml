name: PR Checks

on:
  pull_request:

jobs:
  go-test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentic-adoption-scan/go.mod

      - name: go vet
        working-directory: agentic-adoption-scan
        run: go vet ./...

      - name: go test
        working-directory: agentic-adoption-scan
        run: go test -v -count=1 -race ./...

  goreleaser-dry-run:
    name: GoReleaser dry run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: agentic-adoption-scan/go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
