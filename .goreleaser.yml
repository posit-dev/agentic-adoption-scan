# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - cmd: go mod tidy
      dir: agentic-adoption-scan

builds:
  - id: agentic-adoption-scan
    main: .
    dir: agentic-adoption-scan
    binary: agentic-adoption-scan
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - none*

checksum:
  name_template: checksums.txt

release:
  github:
    owner: posit-dev
    name: eng-effectiveness-metrics-tools
  # Keep the release notes generated by release-please, just upload artifacts
  mode: keep-existing
  skip_upload: false
